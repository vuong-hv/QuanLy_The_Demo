<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bank Về</title>
    <meta name="theme-color" content="#6f42c1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QuanLyNH">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="manifest" href="{{ pwa_manifest_url }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='finance-icon-180.png') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body{background:linear-gradient(180deg, #f5f0ff 0%, #f0f2f5 100%); font-size:clamp(12px, 1vw, 14px);}
        .page-shell { width:min(100%, 980px); margin:0 auto; }
        .money-in{font-weight:bold; color:#6f42c1; font-size:clamp(1.15rem, 4vw, 1.4rem) !important;}
        .total-row{background:#fff3cd; font-weight:bold;}
        .card, .table-responsive { border-radius:18px; overflow:hidden; }
        @media (max-width: 767.98px) {
            .mobile-stack > [class*="col-"] { flex:0 0 auto; width:100%; }
        }
    </style>
</head>
<body class="container-fluid py-2">
    <div class="page-shell">
    <div class="d-flex justify-content-between mb-2"><h6>🏦 TIỀN BANK VỀ</h6><a href="/" class="btn btn-sm btn-secondary py-0">Quay lại</a></div>
    
    <div class="card p-3 mb-3 shadow-sm border-0">
        <form action="/add_company_transfer" method="post">
            <div class="row g-2 mb-2 mobile-stack">
                <div class="col-12 col-md-6"><label class="fw-bold">Ngày nhận:</label><input type="date" name="date" id="today" class="form-control form-control-sm" required></div>
                <div class="col-12 col-md-6"><label class="fw-bold">Công ty:</label><select name="company" class="form-select form-select-sm" required><option value="">-- Chọn --</option>{% for c in companies %}<option value="{{c}}">{{c}}</option>{% endfor %}</select></div>
            </div>
            <div class="mb-2"><label class="fw-bold">Số tiền nhận về:</label><input type="text" name="amount" class="form-control money-in" oninput="formatCur(this)" placeholder="0" required inputmode="numeric"></div>
            <div class="mb-3"><label class="small fw-bold">Ngân hàng nhận:</label><input type="text" name="recipient_bank" class="form-control form-control-sm text-uppercase" placeholder="Ví dụ: VPBANK" autocomplete="off"></div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow">GHI NHẬN TIỀN VỀ</button>
        </form>
    </div>

    <div class="card p-2 p-md-3 mb-2 border-primary">
        <form action="/company_transfers" method="get" class="row g-2 small mobile-stack">
            <div class="col-12 col-md-3">
                <label class="form-label small mb-1">Từ ngày</label>
                <input type="date" name="from_date" class="form-control form-control-sm" value="{{sel_from_date}}">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label small mb-1">Đến ngày</label>
                <input type="date" name="to_date" class="form-control form-control-sm" value="{{sel_to_date}}">
            </div>
            <div class="col-12 col-md-4"><label class="form-label small mb-1">Công ty</label><select name="company" class="form-select form-select-sm"><option value="Tất cả">-- Cty --</option>{% for c in companies %}<option value="{{c}}" {% if sel_cty == c %}selected{% endif %}>{{c}}</option>{% endfor %}</select></div>
            <div class="col-12 col-md-2 d-flex align-items-end"><button type="submit" class="btn btn-dark btn-sm w-100 py-2">Lọc</button></div>
        </form>
    </div>

    <div class="table-responsive bg-white rounded shadow-sm">
        <table class="table table-sm table-bordered mb-0">
            <thead><tr class="table-dark"><th>Ngày</th><th>Cty</th><th>Ngân hàng nhận</th><th class="text-end">Tiền về</th><th class="text-center">X</th></tr></thead>
            <tbody>
                {% for t in transfers %}
                <tr><td class="text-center">{{ t['Ngày tháng'] }}</td><td>{{ t['Tên Công ty'] }}</td><td>{{ t['Ngân hàng nhận'] }}</td><td class="text-end fw-bold text-success">{{ "{:,.0f}".format(t['Số tiền chuyển']) }}</td><td class="text-center"><a href="/delete_company_transfer/{{ t['id'] }}" class="text-danger fw-bold text-decoration-none">✕</a></td></tr>
                {% endfor %}
                <tr class="total-row"><td colspan="3" class="text-center">TỔNG CỘNG:</td><td class="text-end text-dark">{{ "{:,.0f}".format(total_amt) }}</td><td></td></tr>
            </tbody>
        </table>
    </div>
    <script src="{{ url_for('static', filename='money-input.js') }}?v=20260511"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/static/sw.js');
            });
        }
        if(!document.getElementById('today').value) document.getElementById('today').valueAsDate = new Date();
    </script>
    </div>
</body>
</html>
